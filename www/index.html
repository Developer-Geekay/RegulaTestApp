<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: blob: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content: blob:; connect-src 'self' https://sdk.faceki.com;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>Regula SDKs</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="column" style="height:100%">
        <div class="row button-row">
            <button id="get-token" class="button button-primary">Get Token</button>
            <button id="get-link" class="button button-accent">Get link</button>
            <button id="start-verify" class="button button-secondary">Start Verify</button>
        </div>
        <!-- ── Global Console Log ──────────────────────────────────── -->
        <div style="padding-top: 20px;"></div>
        <div class="log-container">
            <div class="log-header">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M4 17l6-6-6-6M12 19h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Console Output
            </div>
            <div id="results">Waiting for device…</div>
        </div>
    </div>


    <script src="cordova.js"></script>
    <script src="js/faceki.js"></script>
</body>

</html>
