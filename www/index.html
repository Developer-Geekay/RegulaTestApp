<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: blob: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content: blob:;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>Regula Face SDK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="column" style="height:100%">

        <!-- ── Header ──────────────────────────────────────────────── -->
        <div class="column header">
            <div class="header-inner">
                <div class="header-logo">
                    <div class="logo-icon">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 4a3 3 0 110 6 3 3 0 010-6zm0 14a7.97 7.97 0 01-6-2.7C6.06 15.74 9.8 14 12 14s5.94 1.74 6 3.3A7.97 7.97 0 0112 20z"
                                fill="currentColor" />
                        </svg>
                    </div>
                    <span class="logo-text">Regula Face SDK</span>
                </div>
                <span class="status-badge" id="status-badge">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Initializing…</span>
                </span>
            </div>
            <div class="column divider"></div>
        </div>

        <!-- ── Sub-header: Stats ────────────────────────────────────── -->
        <div class="column sub-header">
            <div class="row stats-row">
                <div class="stat-item">
                    <span class="stat-label">Similarity</span>
                    <span id="similarity-status" class="stat-value">—</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Liveness</span>
                    <span id="liveness-status" class="stat-value">—</span>
                </div>
            </div>
            <div class="column divider"></div>
        </div>

        <!-- ── Main content ─────────────────────────────────────────── -->
        <div class="column no-scroll main-content">

            <!-- Step 1 — Initialize (with optional license file) -->
            <div class="init-card">
                <div class="init-card-label">License File (optional — for offline mode)</div>
                <div class="license-row">
                    <label class="license-pick-btn" for="licenseFile" id="licenseLabel">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            <path d="M14 2v6h6M12 18v-6M9 15l3-3 3 3" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Choose .license file
                    </label>
                    <input type="file" id="licenseFile" accept=".license" style="display:none">
                    <button id="btnInit" class="button button-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                        Initialize SDK
                    </button>
                </div>
            </div>

            <!-- Face image slots (Step 4 / Step 5 input) -->
            <div class="row image-row">
                <!-- Slot 1 -->
                <div class="image-slot" id="slot-first">
                    <div class="image-placeholder" id="placeholder-first">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 4a3 3 0 110 6 3 3 0 010-6zm0 14a7.97 7.97 0 01-6-2.7C6.06 15.74 9.8 14 12 14s5.94 1.74 6 3.3A7.97 7.97 0 0112 20z"
                                fill="currentColor" opacity="0.35" />
                        </svg>
                        <span>Tap to add</span>
                    </div>
                    <img id="first-image" style="display:none" alt="Face 1">
                    <div class="slot-label">Image 1</div>
                </div>

                <!-- Slot 2 -->
                <div class="image-slot" id="slot-second">
                    <div class="image-placeholder" id="placeholder-second">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 4a3 3 0 110 6 3 3 0 010-6zm0 14a7.97 7.97 0 01-6-2.7C6.06 15.74 9.8 14 12 14s5.94 1.74 6 3.3A7.97 7.97 0 0112 20z"
                                fill="currentColor" opacity="0.35" />
                        </svg>
                        <span>Tap to add</span>
                    </div>
                    <img id="second-image" style="display:none" alt="Face 2">
                    <div class="slot-label">Image 2</div>
                </div>
            </div>

            <!-- Hidden file inputs for slot image picking -->
            <!-- Camera capture -->
            <input type="file" id="imgPickCamera" accept="image/*" capture="environment" style="display:none">
            <!-- Gallery -->
            <input type="file" id="imgPickGallery" accept="image/*" style="display:none">
            <!-- Any file -->
            <input type="file" id="imgPickFile" accept="image/*,application/octet-stream" style="display:none">

            <!-- Primary actions: Match + Liveness -->
            <div class="row button-row">
                <button id="match-faces" class="button button-primary" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M15 3H21V9M9 21H3V15M21 3L14 10M10 14L3 21" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Match
                </button>
                <button id="start-liveness" class="button button-accent">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                        <path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    Liveness
                </button>
                <button id="detect-face" class="button button-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M5 3H3v4M19 3h2v4M5 21H3v-4M19 21h2v-4M9 9h6v6H9z" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Detect
                </button>
            </div>

            <!-- Secondary actions: Face Capture + Detect + Clear -->
            <div class="row button-row">
                <button id="clear-results" class="button button-ghost">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Clear
                </button>
            </div>

            <!-- SDK deinit -->
            <div class="row button-row sdk-controls">
                <button id="btnDeinit" class="button button-outline" style="flex:1">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                        <line x1="8" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                    Deinitialize SDK
                </button>
            </div>

            <!-- Console log -->
            <div class="log-container">
                <div class="log-header">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                        <path d="M4 17l6-6-6-6M12 19h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    Console Output
                </div>
                <div id="results">Waiting for device…</div>
            </div>

            <div style="padding-bottom:30px"></div>
        </div><!-- /.main-content -->

    </div><!-- /.column -->

    <!-- ── Action Sheet (image source picker) ──────────────────── -->
    <div id="action-sheet-overlay" class="action-sheet-overlay" style="display:none">
        <div class="action-sheet" id="action-sheet">
            <div class="action-sheet-title">Select image source</div>
            <button id="face-capture" class="action-sheet-btn" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2" />
                </svg>
                Regula Camera
            </button>
            <button id="as-camera" class="action-sheet-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2" />
                </svg>
                Camera
            </button>
            <button id="as-gallery" class="action-sheet-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="2" />
                    <path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Gallery
            </button>
            <button id="as-file" class="action-sheet-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M14 2v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                Choose File
            </button>
            <button id="as-cancel" class="action-sheet-btn cancel">Cancel</button>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
